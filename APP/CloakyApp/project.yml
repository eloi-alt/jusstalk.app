name: Cloakyy
options:
  bundleIdPrefix: com.cloakyy
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    PRODUCT_NAME: Cloakyy
    INFOPLIST_FILE: Resources/Info.plist
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
      STRIP_STYLE: "all"
      STRIP_INSTALLED_PRODUCT: YES
      COPY_PHASE_STRIP: YES
      ENABLE_BITCODE: NO
      SWIFT_COMPILATION_MODE: "wholemodule"

targets:
  Cloakyy:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Core
      - path: Domain
      - path: UI
      - path: Utilities
      - path: Resources
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Cloakyy
        CFBundleShortVersionString: "1.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        NSPhotoLibraryUsageDescription: "Cloakyy needs access to your Photo Library so you can select existing photos for face detection and blurring. The app analyzes your photos on-device using Apple's Vision framework to identify faces, then applies blur effects to protect people's identities. Your photos are never uploaded or shared — all processing is performed locally on your device."
        NSPhotoLibraryAddUsageDescription: "Cloakyy needs permission to save photos to your library so that processed images — with faces detected and blurred — can be stored directly in your Photo Library. This allows you to easily access and share your anonymized photos. No data leaves your device."
        NSCameraUsageDescription: "Cloakyy uses your camera to take photos so it can automatically detect and blur faces directly on your device, protecting the identity of people in your images before you share them. No photos or data are sent to any server — all processing happens entirely on your device."
        ITSAppUsesNonExemptEncryption: false
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.cloakyy
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      CODE_SIGN_ENTITLEMENTS: Cloakyy.entitlements
    entitlements:
      path: Cloakyy.entitlements
      properties:
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)com.cloakyy
    scheme:
      testTargets: []
